{% extends 'base.html' %}

{% block body_class %}no-blur-bg pdf-preview-page{% endblock %}

{% block content %}
{% include "pos/pdf/_pos_pdf_styles.html" %}
<div class="page-container">
<div class="d-flex justify-content-between align-items-center pos-pdf-preview-actions">
    <div>
        <h2 class="fw-bold mb-0">POS PDF Preview</h2>
        <p class="text-muted mb-0">
            Preview the generated POS before downloading.
        </p>
    </div>

    <div>
        <a href="{% url 'pos_pdf_download' pos_plan.id %}" class="btn btn-danger">
            Download PDF
        </a>

    </div>
</div>

<div class="pos-pdf-preview-scroll">
    {% include "pos/pdf/_pos_pdf_document.html" %}
</div>
</div>
{% endblock %}
