{% extends 'base.html' %}
{% load static %}

{% block content %}
<section class="upload-shell">
    <div class="upload-card" style="max-width: 560px;">
        <div class="d-flex justify-content-between align-items-start mb-4">
            <a href="javascript:history.back()" class="btn btn-outline-secondary btn-sm">
                <i class="fa-solid fa-arrow-left"></i> Back
            </a>
        </div>

        <div class="text-center mb-4">
            <img src="{% static 'images/BOT_logo.png' %}" alt="Back onTrack" class="brand-logo mb-3">
            <h1 class="fw-bold text-maroon mb-1">Login to your Account</h1>
            <p class="muted-copy mb-0">Use your registered Auto-POS credentials.</p>
        </div>

        <form method="POST">
            {% csrf_token %}

            {% if form.non_field_errors %}
                <div class="alert alert-danger">
                    {{ form.non_field_errors }}
                </div>
            {% endif %}

            <div class="mb-3">
                <label class="form-label fw-bold">Email Address</label>
                {{ form.email }}
            </div>

            <div class="mb-4">
                <label class="form-label fw-bold">Password</label>
                <div class="position-relative">
                    {{ form.password }}
                    <button type="button" class="btn btn-link password-toggle-btn" id="togglePasswordBtn">
                        <i class="fa-solid fa-eye"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn btn-danger red-btn w-100">
                Log In
            </button>
        </form>
    </div>
</section>

<style>
    .position-relative {
        position: relative;
    }

    .password-toggle-btn {
        position: absolute;
        right: 12px;
        top: 50%;
        transform: translateY(-50%);
        padding: 4px 8px;
        color: var(--bot-muted);
        text-decoration: none;
        border: none;
        background: none;
        cursor: pointer;
        z-index: 10;
    }

    .password-toggle-btn:hover {
        color: var(--bot-text);
    }

    #id_password {
        padding-right: 40px;
    }
</style>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const passwordInput = document.getElementById('id_password');
        const toggleBtn = document.getElementById('togglePasswordBtn');

        if (passwordInput && toggleBtn) {
            toggleBtn.addEventListener('click', function(e) {
                e.preventDefault();
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);

                // Toggle icon
                const icon = toggleBtn.querySelector('i');
                if (type === 'password') {
                    icon.classList.remove('fa-eye-slash');
                    icon.classList.add('fa-eye');
                } else {
                    icon.classList.remove('fa-eye');
                    icon.classList.add('fa-eye-slash');
                }
            });
        }
    });
</script>
{% endblock %}
